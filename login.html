<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="Icon" href="assets/icons/symbol/favicon-32x32.png" type="image/png"  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <img src="assets/icons/Logo OG.png" alt="Logo" class="logo" />
  <div class="login-container">
    <div class="tabs">
      <span id="userTab" class="tab active" onclick="switchTab('user')">User</span>
      <span id="adminTab" class="tab" onclick="switchTab('admin')">Admin</span>
    </div>

    <!-- User Login Form -->
    <form id="userForm" class="login-form" method="POST">
      <h2>User Login</h2>
      <div class="input-icon">
        <input type="text" name="username" placeholder="Username" required />
        <img src="assets/icons/username.png" alt="icon" />
      </div>
      
      <div class="input-icon">
        <input type="password" name="password" placeholder="Password" required />
        <img src="assets/icons/password-lock.png" alt="icon" />
      </div>
      
      <button type="submit">Login</button>

      <div class="checkbox-group">
        <input type="checkbox" id="rememberMeUser" name="remember_me" />
        <label for="rememberMeUser">Remember Me</label>
      </div>

      <div class="register-link">
        New member? <a href="register.html">Register</a>
      </div>
    </form>

    <!-- Admin Login Form -->
    <form id="adminForm" class="login-form" method="POST" style="display: none;">
      <h2>Admin Login</h2>
      <div class="input-icon">
        <input type="text" name="username" placeholder="Username" required />
        <img src="assets/icons/username.png" alt="icon" />
      </div>
      
      <div class="input-icon">
        <input type="password" name="password" placeholder="Password" required />
        <img src="assets/icons/password-lock.png" alt="icon" />
      </div>
      <button type="submit">Login</button>

      <div class="checkbox-group">
        <input type="checkbox" id="rememberMeAdmin" name="remember_me" />
        <label for="rememberMeAdmin">Remember Me</label>
      </div>
    </form>
    
  </div>
   
  <script src="js/login.js"></script>
</body>
</html>
