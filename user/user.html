<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Attendant Dashboard</title>
  <link rel="Icon" href="../assets/icons/symbol/favicon-32x32.png" type="image/png"  />
  <link rel="stylesheet" href="../css/user.css" />   
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18/build/css/intlTelInput.css" />

</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <img src="../assets/icons/logo1.png" alt="Logo" class="logo" />
      <h4>Sales Attendant Dashboard</h4>
      <nav>
        <div class="nav-option active" onclick="loadSection('overview', this)">
            <img src="../assets/icons/dashboard.png" alt="Overview Icon" class="nav-icon" />
          Overview
        </div>
        <div class="nav-option" onclick="loadSection('make-sale', this)">
            <img src="../assets/icons/icons8-sell-100.png" alt="Register Icon" class="nav-icon" />
          Make a Sale
        </div>
        <div class="nav-option" onclick="loadSection('my-sales', this)">
            <img src="../assets/icons/icons8-sales-performance-100.png" alt="View Icon" class="nav-icon" />
          My Sales
        </div>
        <div class="nav-option" onclick="loadSection('support', this)">
            <img src="../assets/icons/icons8-support-100.png" alt="Settings Icon" class="nav-icon" />
          Support
        </div>
        <div class="nav-option" onclick="loadSection('settings', this)">
            <img src="../assets/icons/settings.png" alt="Settings Icon" class="nav-icon" />
          Settings
        </div>
        <div class="nav-option" onclick="window.location.href='../php/logout.php'">
            <img src="../assets/icons/logout.png" alt="Logout Icon" class="nav-icon" />
          Logout
        </div>
      </nav>
    </aside>

    <main class="content" id="main-content">
      <!-- Default overview section will be loaded here -->
       
    </main>

  </div>

<!-- Add this near the bottom of your HTML or in your main JS -->
<script>
function openSettingsModal(type) {
  const modal = document.getElementById('settings-modal');
  const modalContent = document.getElementById('settings-modal-content');

  let content = '';

  if (type === 'profile') {
    content = `
      <h2>Account Settings</h2>
      <form id="profile-form" onsubmit="updateProfile(event)">
        <label>Username</label>
        <input type="text" id="profile-username" placeholder="Change username" />
        <label>Email</label>
        <input type="email" id="profile-email" placeholder="Change email" />
        <label>Current Password (required for changes)</label>
        <input type="password" id="current-password" placeholder="Enter current password" />
        <label>New Password (optional)</label>
        <input type="password" id="new-password" placeholder="New password" />
        <label>Confirm New Password</label>
        <input type="password" id="confirm-password" placeholder="Confirm new password" />
        <div class="form-actions">
          <button type="submit" class="save-btn">Save Changes</button>
          <button type="button" onclick="closeSettingsModal()" class="cancel-btn">Cancel</button>
        </div>
      </form>
      <div id="profile-message" style="margin-top: 10px;"></div>
    `;
    
    modalContent.innerHTML = content;
    modal.style.display = 'flex';
    
    // Load user profile data
    loadUserProfile();
    
  } else if (type === 'appearance') {
    
  const savedTheme = localStorage.getItem('theme') || 'default';
  const savedLayout = localStorage.getItem('layout') || 'standard';

  content = `
    <h2>Appearance</h2>

    <label>Theme</label>
    <select id="theme-select">
      <option value="default" ${savedTheme === 'default' ? 'selected' : ''}>Default</option>
      <option value="dark" ${savedTheme === 'dark' ? 'selected' : ''}>Dark</option>
      <option value="light" ${savedTheme === 'light' ? 'selected' : ''}>Light</option>
    </select>

    <label>Layout Style</label>
    <select id="layout-select">
      <option value="standard" ${savedLayout === 'standard' ? 'selected' : ''}>Standard</option>
      <option value="compact" ${savedLayout === 'compact' ? 'selected' : ''}>Compact</option>
    </select>

    <button onclick="applyAppearanceSettings()">Save Preferences</button>
  `;
  } else if (type === 'security') {
    content = `
        <h2>Security Settings</h2>
        <div class="security-settings-content">
            <div class="security-section">
                <h3>Two-Factor Authentication</h3>
                <div class="twofa-status">
                    <p>Status: <span id="2fa-status" class="status-disabled">Loading...</span></p>
                </div>
                
                <div class="twofa-actions">
                    <button id="enable-2fa-btn" onclick="setup2FA()" class="action-btn primary">Enable 2FA</button>
                    <button id="disable-2fa-btn" onclick="disable2FA()" class="action-btn secondary" style="display: none;">Disable 2FA</button>
                </div>
                
                <div class="security-info">
                    <h4>About 2FA</h4>
                    <p>Two-factor authentication adds an extra layer of security to your account. 
                    You'll need to enter a code from your authenticator app when logging in.</p>
                    <ul>
                        <li>Download Google Authenticator or Authy on your phone</li>
                        <li>Scan the QR code during setup</li>
                        <li>Save your backup codes securely</li>
                        <li>Enter a code each time you login</li>
                    </ul>
                </div>
            </div>
            
            <div class="modal-actions">
                <button onclick="closeSettingsModal()" class="cancel-btn">Close</button>
            </div>
        </div>
    `;

    modalContent.innerHTML = content;
    modal.style.display = 'flex';
    
    load2FAStatus();
}

  modalContent.innerHTML = content;
  modal.style.display = 'flex';
}

function closeSettingsModal() {
  document.getElementById('settings-modal').style.display = 'none';
}
</script>
<div id="settings-modal" class="modal-overlay" style="display: none;">
  <div class="modal-box">
    <span class="close-btn" onclick="closeSettingsModal()">&times;</span>
    <div id="settings-modal-content"></div>
  </div>
</div>

  <script src="../js/user.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18/build/js/intlTelInput.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
