<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>POS Demo</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f6f8;
      padding: 20px;
    }

    .pos-wrapper {
      max-width: 1000px;
      margin: auto;
    }

    .pos-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }

    .pos-group label {
      font-weight: 600;
      display: block;
      margin-bottom: 5px;
    }

    .pos-group input,
    .pos-group select {
      width: 100%;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }

    .pos-group input[readonly] {
      background: #f0f0f0;
    }

    .cart-area {
      background: white;
      padding: 20px;
      border-radius: 12px;
      min-height: 150px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .cart-item strong {
      color: #333;
    }

    .autocomplete-group {
      position: relative;
    }

    .autocomplete-list {
      position: absolute;
      z-index: 1000;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #ccc;
      max-height: 150px;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0;
      border-radius: 4px;
    }

    .autocomplete-list li {
      padding: 8px 10px;
      cursor: pointer;
    }

    .autocomplete-list li:hover {
      background-color: #f0f0f0;
    }

  </style>
</head>
<body>

  <div class="pos-wrapper">
    <h2>Point of Sale</h2>

    <form onsubmit="handleAddToCart(event)">
      <div class="pos-grid">
        <div class="pos-group">
          <div class="form-group autocomplete-group">
            <label for="product-search">Product</label>
            <input type="text" id="product-search" placeholder="Start typing product name..." oninput="filterProducts()" autocomplete="off" />
            <ul id="product-list" class="autocomplete-list"></ul>
          </div>
        </div>

        <div class="pos-group">
          <label>Total</label>
          <input type="text" id="total" readonly />
        </div>

        <div class="pos-group">
          <label>Change</label>
          <input type="text" id="change" readonly />
        </div>

        <div class="pos-group">
          <label>Quantity (Litres)</label>
          <input type="number" id="quantity" min="1" oninput="updateTotal()" required />
        </div>

        <div class="pos-group">
          <label for="payment-method">Payment Option</label>
          <select id="payment-method" onchange="togglePaymentFields()" required>
            <option value="">Select method</option>
            <option value="cash">Cash</option>
            <option value="mpesa">M-PESA</option>
            <option value="card">Card</option>
          </select>
        </div>

        <div class="pos-group" id="cash-field" style="display: none;">
          <label>Money Received</label>
          <input type="number" id="cash-paid" oninput="calculateChange()" />
        </div>

        <div class="pos-group" id="mpesa-field" style="display: none;">
          <label>Phone Number</label>
          <input type="tel" id="mpesa-phone" placeholder="07XXXXXXXX" pattern="^07\d{8}$" />
        </div>

        <div class="pos-group" id="card-field" style="display: none;">
          <label>Card Number</label>
          <input type="text" id="card-number" placeholder="XXXX-XXXX-XXXX-XXXX" />
        </div>
      </div>

      <button type="submit" style="margin-top: 10px; padding: 10px 20px;">Add to Cart</button>
    </form>


    <div class="cart-area" id="cart-area">
      <h3>Running Total</h3>
      <div id="cart-items"></div>
    </div>
  </div>

  <script>
    const productSelect = document.getElementById('product');
    const quantityInput = document.getElementById('quantity');
    const totalField = document.getElementById('total');
    const cashPaid = document.getElementById('cash-paid');
    const changeField = document.getElementById('change');
    const paymentMethod = document.getElementById('payment-method');

    const cartItemsDiv = document.getElementById('cart-items');
    let cart = [];

    // Example product list with prices
    const products = [
      { name: "Petrol - 1L", price: 145 },
      { name: "Diesel - 1L", price: 130 },
      { name: "Lubricant - 1L", price: 350 },
      { name: "Brake Fluid - 500ml", price: 180 },
      { name: "Engine Oil - 5L", price: 1600 }
    ];
    let selectedProduct = null;

    function filterProducts() {
      const input = document.getElementById('product-search');
      const list = document.getElementById('product-list');
      const query = input.value.toLowerCase();
      list.innerHTML = "";

      if (!query) return;

      const matches = products.filter(p => p.name.toLowerCase().includes(query));
      matches.forEach(product => {
        const li = document.createElement('li');
        li.textContent = product.name;
        li.onclick = () => selectProduct(product);
        list.appendChild(li);
     });
    }

    function selectProduct(product) {
      document.getElementById('product-search').value = product.name;
      document.getElementById('product-list').innerHTML = '';
      selectedProduct = product;
      updatePOSPrice();
    }

    function updatePOSPrice() {
      const quantity = parseFloat(document.getElementById('quantity').value || 0);
      const total = selectedProduct ? (selectedProduct.price * quantity) : 0;
      document.getElementById('total').value = total ? total.toFixed(2) : '';
      updateChange(); // If you have a cash field and want to show change
    }


    function updateTotal() {
      const selected = productSelect.options[productSelect.selectedIndex];
      const price = parseFloat(selected.getAttribute('data-price') || 0);
      const qty = parseFloat(quantityInput.value || 0);
      const total = price * qty;
      totalField.value = isNaN(total) ? '' : total.toFixed(2);
      calculateChange();
    }

    function calculateChange() {
      if (paymentMethod.value !== 'cash') {
        changeField.value = '';
        return;
      }
      const cash = parseFloat(cashPaid.value || 0);
      const total = parseFloat(totalField.value || 0);
      const change = cash - total;
      changeField.value = change >= 0 ? change.toFixed(2) : '';
    }

    function togglePaymentFields() {
      const method = paymentMethod.value;

      document.getElementById('cash-field').style.display = method === 'cash' ? 'block' : 'none';
      document.getElementById('mpesa-field').style.display = method === 'mpesa' ? 'block' : 'none';
      document.getElementById('card-field').style.display = method === 'card' ? 'block' : 'none';

    // Reset irrelevant fields
      if (method !== 'cash') {
        cashPaid.value = '';
        changeField.value = '';
      }
    }


    function handleAddToCart(e) {
      e.preventDefault();

      const productText = productSelect.options[productSelect.selectedIndex].text;
      const qty = quantityInput.value;
      const total = totalField.value;
      const method = paymentMethod.value;

      cart.push({ productText, qty, total, method });

      renderCart();
      e.target.reset();
      totalField.value = '';
      changeField.value = '';
      toggleCashField();
    }

    function renderCart() {
      cartItemsDiv.innerHTML = '';
      cart.forEach((item, index) => {
        cartItemsDiv.innerHTML += `
          <div class="cart-item">
            <span>${item.productText} x ${item.qty}</span>
            <strong>Ksh ${item.total}</strong>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
